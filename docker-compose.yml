services:
  db:
    image: postgres:16-alpine
    pull_policy: if_not_present
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  customers-api:
    build: ./customers_api
    ports:
      - "8080:8080"
    environment:
      SECRET_CONFIG_DB_URL: ${CUSTOMERS_DB_URL}
      SECRET_CONFIG_DB_USERNAME: ${DB_USERNAME}
      SECRET_CONFIG_DB_PASSWORD: ${DB_PASSWORD}
      CONFIG_HTTP_HTTPS_PORT: 8080
      TRANSACTIONAL_API_BASE_URL: http://transactional-api:8081
    depends_on:
      db:
        condition: service_healthy

  transactional-api:
    build: ./transactional_api
    ports:
      - "8081:8081"
    environment:
      SECRET_CONFIG_DB_URL: ${TRANSACTIONAL_DB_URL}
      SECRET_CONFIG_DB_USERNAME: ${DB_USERNAME}
      SECRET_CONFIG_DB_PASSWORD: ${DB_PASSWORD}
      CONFIG_HTTP_HTTPS_PORT: 8081
      CUSTOMERS_API_BASE_URL: http://customers-api:8080
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: