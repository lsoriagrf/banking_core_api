spring.application.name=transactional_api

# R2DBC
spring.r2dbc.url=${SECRET_CONFIG_DB_URL}
spring.r2dbc.username=${SECRET_CONFIG_DB_USERNAME}
spring.r2dbc.password=${SECRET_CONFIG_DB_PASSWORD}
spring.r2dbc.pool.initial-size=5
spring.r2dbc.pool.max-size=20

# Schema initialization
spring.sql.init.platform=postgresql
spring.sql.init.mode=always

# Server
server.port=${CONFIG_HTTP_HTTPS_PORT}

# External services
app.customers-api.base-url=${CUSTOMERS_API_BASE_URL}

# OpenAPI
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha